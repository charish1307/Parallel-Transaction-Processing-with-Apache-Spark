name: Spark CI - Validate and Test

on:
  push:
      branches: [ main ]
        pull_request:
            branches: [ main ]

            jobs:
              spark-test:
                  runs-on: ubuntu-latest

                      steps:
                          - name: Checkout repository
                                uses: actions/checkout@v3

                                    - name: Set up Python 3.10
                                          uses: actions/setup-python@v4
                                                with:
                                                        python-version: "3.10"

                                                            - name: Set up Java (required for Spark)
                                                                  uses: actions/setup-java@v3
                                                                        with:
                                                                                java-version: '11'
                                                                                        distribution: 'temurin'

                                                                                            - name: Install dependencies
                                                                                                  run: |
                                                                                                          python -m pip install --upgrade pip
                                                                                                                  pip install pyspark pandas numpy matplotlib jupyter nbconvert
                                                                                                                  
                                                                                                                      - name: Validate Jupyter Notebooks
                                                                                                                            run: |
                                                                                                                                    for nb in *.ipynb; do
                                                                                                                                              if [ -f "$nb" ]; then
                                                                                                                                                          echo "Validating: $nb"
                                                                                                                                                                      jupyter nbconvert --to script "$nb" --stdout > /dev/null && echo "PASS: $nb" || echo "WARN: $nb"
                                                                                                                                                                                fi
                                                                                                                                                                                        done
                                                                                                                                                                                        
                                                                                                                                                                                            - name: Test PySpark Import
                                                                                                                                                                                                  run: |
                                                                                                                                                                                                          python -c "from pyspark.sql import SparkSession; print('PySpark import successful')"
                                                                                                                                                                                                          
                                                                                                                                                                                                              - name: CI Complete
                                                                                                                                                                                                                    run: echo "Spark CI pipeline completed successfully!"
